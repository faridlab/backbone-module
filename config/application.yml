# Minimal application configuration for the skeleton module.
# Copy and adjust for your deployment environment.

server:
  host: "0.0.0.0"
  port: 8080

database:
  # Override at runtime via the DATABASE_URL environment variable.
  url: "postgresql://root:password@localhost:5432/skeletondb"
  max_connections: 10

logging:
  level: "info"
